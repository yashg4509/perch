name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: auto
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # web/embed.go uses //go:embed all:dist — dist must exist before go vet/test compile the web package.
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web UI (go:embed)
        working-directory: web
        run: npm ci && npm run build:embed

      - name: Format (gofmt)
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: gosec
        # G304: reading user-project files (perch.yaml, package.json, providers/) is the CLI’s job.
        run: go run github.com/securego/gosec/v2/cmd/gosec@latest -quiet -exclude=G304 ./...

      - name: Test
        run: go test ./...
