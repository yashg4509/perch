name: Release

# Security: use a GitHub Environment named `release` with “Required reviewers”
# (you + sharathb5). Secrets for that environment are only available after approval,
# so a random tag push cannot publish binaries or update the Homebrew tap without a maintainer OK.
#
# Also: Settings → Rules → Tag rules → protect `v*` so only trusted roles can create release tags.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    # Do not run on forks (no secrets; avoids noisy failed runs).
    if: github.repository == 'yashg4509/perch'
    runs-on: ubuntu-latest
    environment: release
    env:
      GOTOOLCHAIN: auto
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web UI (go:embed)
        working-directory: web
        run: npm ci && npm run build:embed

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Fine-grained PAT or classic `repo` token with push access to yashg4509/homebrew-perch
          # (the default GITHUB_TOKEN cannot push to another repository).
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
