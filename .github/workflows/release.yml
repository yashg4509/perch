name: Release

# Runs when commits land on main. GoReleaser still needs a git tag, so this workflow
# creates a unique semver tag (v0.0.<run> or v0.0.<run>-retry.<attempt>) then publishes
# GitHub release assets + Homebrew tap.
#
# Security: attach a GitHub Environment named `release` with “Required reviewers” so
# secrets and publishing only run after you approve the deployment for that run.
#
# If you use tag protection rules for `v*`, allow the default GITHUB_TOKEN (or your
# deploy bot) to create tags, or tag creation will fail.
on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: goreleaser-${{ github.repository }}
  cancel-in-progress: false

jobs:
  goreleaser:
    if: github.repository == 'yashg4509/perch'
    runs-on: ubuntu-latest
    environment: release
    env:
      GOTOOLCHAIN: auto
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release tag
        id: tag
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          base="v0.0.${{ github.run_number }}"
          if git rev-parse "$base" >/dev/null 2>&1; then
            version="${base}-retry.${{ github.run_attempt }}"
          else
            version="$base"
          fi
          git tag -a "$version" -m "Release $version (main @ ${{ github.sha }})"
          git push origin "refs/tags/$version"
          echo "tag=$version" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web UI (go:embed)
        working-directory: web
        run: npm ci && npm run build:embed

      - name: Require Homebrew tap PAT
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          if [ -z "$HOMEBREW_TAP_GITHUB_TOKEN" ]; then
            echo "::error::Set secret HOMEBREW_TAP_GITHUB_TOKEN (classic PAT with repo scope, or fine-grained PAT with Contents write on yashg4509/homebrew-perch). Add it on the release environment or as a repository secret. The default GITHUB_TOKEN cannot push to another repository."
            exit 1
          fi

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
