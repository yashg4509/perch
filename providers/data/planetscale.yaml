# Docs: https://planetscale.com/docs/api/reference/list_databases — base https://api.planetscale.com/v1
name: planetscale
category: db
deployable: false

api:
  base_url: "https://api.planetscale.com/v1"
  auth_header: "Authorization: Bearer {token}"
  endpoints:
    status: "GET /organizations/{project}/databases"
    list_resources: "GET /organizations"

credentials:
  key: planetscale_service_token
  prompt: "PlanetScale service token (app.planetscale.com → Settings → Service tokens)"
