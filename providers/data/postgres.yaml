# Prisma `provider = postgresql` maps here; same Neon Management API as neon.yaml (https://api-docs.neon.tech/reference/getproject)
name: postgres
category: db
deployable: false

api:
  base_url: "https://console.neon.tech/api/v2"
  auth_header: "Authorization: Bearer {token}"
  endpoints:
    status: "GET /projects/{project}"
    list_resources: "GET /projects"

credentials:
  key: neon_api_key
  prompt: "Neon API key (console.neon.tech); project id is the Neon project id"
